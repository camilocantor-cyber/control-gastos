<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAccount - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="bg-container"></div>

    <div class="login-card">
        <h1>CREAR CUENTA</h1>
        <p class="subtitle">Registro de nuevo usuario</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">USUARIO</label>
                <input type="text" id="username" required placeholder="Ingresa tu usuario">
            </div>
            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" required placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="password">CONTRASEÑA</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="confirmPassword">CONFIRMAR CONTRASEÑA</label>
                <input type="password" id="confirmPassword" required placeholder="••••••••">
            </div>
            <button type="submit" id="registerBtn">CREAR CUENTA</button>
            <div id="errorMsg" class="error-message"></div>
            <div id="successMsg"
                style="display: none; color: #10b981; font-size: 0.9rem; margin-top: 1rem; text-align: center; padding: 0.75rem; background: rgba(16, 185, 129, 0.1); border-radius: 0.5rem; border: 1px solid rgba(16, 185, 129, 0.2);">
            </div>
            <div
                style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.75rem;">¿Ya tienes cuenta?</p>
                <a href="index.html"
                    style="color: #ff6b35; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: all 0.3s;">
                    Iniciar sesión →
                </a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validaciones
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Las contraseñas no coinciden';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successMsg.textContent = '✅ Cuenta creada exitosamente. Redirigiendo al login...';
                    successMsg.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.error || 'Error al crear la cuenta';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Error de conexión: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
