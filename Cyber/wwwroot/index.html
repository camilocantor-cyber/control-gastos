<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAccount - Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="bg-container"></div>

    <div class="login-card">
        <h1>CYBERACCOUNT</h1>
        <p class="subtitle">Secure login for authorized personnel</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">USERNAME</label>
                <input type="text" id="username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="loginBtn">INITIALIZE ACCESS</button>
            <div id="errorMsg" class="error-message"></div>
            <div
                style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.75rem;">¿No tienes cuenta?</p>
                <a href="register.html"
                    style="color: #ff6b35; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: all 0.3s;">
                    Crear cuenta nueva →
                </a>
            </div>
        </form>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
